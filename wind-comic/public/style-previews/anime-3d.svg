<svg xmlns="http://www.w3.org/2000/svg" width="280" height="350" viewBox="0 0 280 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="40%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#0D1B3E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="30%"><stop offset="0%" stop-color="#FFD54F" stop-opacity="0.2"/><stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/></radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="280" height="350" fill="url(#bg)"/>
  <rect width="280" height="350" fill="url(#light)"/>
  <!-- Palace structure -->
  <rect x="80" y="60" width="120" height="140" fill="#1A237E" stroke="#FFD54F" stroke-width="0.8" opacity="0.8"/>
  <!-- Palace roof -->
  <path d="M60 60 L140 15 L220 60Z" fill="#283593" stroke="#FFD54F" stroke-width="0.8"/>
  <path d="M70 60 L140 25 L210 60Z" fill="#1A237E"/>
  <!-- Roof ornament -->
  <circle cx="140" cy="15" r="4" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Pillars -->
  <rect x="95" y="60" width="8" height="140" fill="#1A237E" stroke="#FFD54F" stroke-width="0.5" opacity="0.6"/>
  <rect x="130" y="60" width="8" height="140" fill="#1A237E" stroke="#FFD54F" stroke-width="0.5" opacity="0.6"/>
  <rect x="165" y="60" width="8" height="140" fill="#1A237E" stroke="#FFD54F" stroke-width="0.5" opacity="0.6"/>
  <!-- God rays -->
  <path d="M140 15 L100 200 L120 200Z" fill="#FFD54F" opacity="0.03"/>
  <path d="M140 15 L160 200 L180 200Z" fill="#FFD54F" opacity="0.03"/>
  <!-- Steps -->
  <rect x="70" y="200" width="140" height="8" fill="#1A237E" stroke="#3949AB" stroke-width="0.5"/>
  <rect x="60" y="208" width="160" height="8" fill="#1A237E" stroke="#3949AB" stroke-width="0.5"/>
  <rect x="50" y="216" width="180" height="8" fill="#1A237E" stroke="#3949AB" stroke-width="0.5"/>
  <!-- Warrior figure -->
  <ellipse cx="140" cy="250" rx="10" ry="25" fill="#C62828" opacity="0.7"/>
  <circle cx="140" cy="222" r="6" fill="#FFCC80" opacity="0.6"/>
  <!-- Armor highlights -->
  <path d="M133 235 L140 230 L147 235" stroke="#FFD54F" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Clouds -->
  <ellipse cx="40" cy="80" rx="35" ry="10" fill="#3949AB" opacity="0.3"/>
  <ellipse cx="240" cy="60" rx="30" ry="8" fill="#3949AB" opacity="0.25"/>
  <!-- Ground mist -->
  <ellipse cx="140" cy="310" rx="120" ry="30" fill="#1A237E" opacity="0.5"/>
</svg>