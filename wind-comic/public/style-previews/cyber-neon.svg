<svg xmlns="http://www.w3.org/2000/svg" width="280" height="350" viewBox="0 0 280 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0A0A1A"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow2"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>
  <rect width="280" height="350" fill="url(#bg)"/>
  <!-- Buildings -->
  <rect x="0" y="30" width="50" height="320" fill="#0A0A18"/>
  <rect x="55" y="60" width="40" height="290" fill="#08081A"/>
  <rect x="100" y="20" width="35" height="330" fill="#0C0C1E"/>
  <rect x="150" y="50" width="45" height="300" fill="#0A0A1C"/>
  <rect x="200" y="35" width="38" height="315" fill="#08081A"/>
  <rect x="243" y="70" width="37" height="280" fill="#0B0B1A"/>
  <!-- Neon cyan lines -->
  <rect x="5" y="100" width="40" height="3" rx="1" fill="#00E5FF" filter="url(#glow)" opacity="0.8"/>
  <rect x="60" y="150" width="30" height="2" rx="1" fill="#00E5FF" filter="url(#glow)" opacity="0.6"/>
  <rect x="155" y="120" width="35" height="3" rx="1" fill="#00E5FF" filter="url(#glow)" opacity="0.7"/>
  <!-- Neon magenta lines -->
  <rect x="105" y="80" width="25" height="2" rx="1" fill="#FF4081" filter="url(#glow)" opacity="0.7"/>
  <rect x="205" y="100" width="30" height="3" rx="1" fill="#FF4081" filter="url(#glow)" opacity="0.8"/>
  <rect x="248" y="170" width="27" height="2" rx="1" fill="#FF4081" filter="url(#glow)" opacity="0.6"/>
  <!-- Window grids -->
  <g opacity="0.15" fill="#00E5FF">
    <rect x="8" y="140" width="4" height="3"/><rect x="16" y="140" width="4" height="3"/><rect x="24" y="140" width="4" height="3"/>
    <rect x="8" y="150" width="4" height="3"/><rect x="16" y="150" width="4" height="3"/><rect x="24" y="150" width="4" height="3"/>
    <rect x="160" y="170" width="4" height="3"/><rect x="168" y="170" width="4" height="3"/><rect x="176" y="170" width="4" height="3"/>
  </g>
  <!-- Holographic ad -->
  <rect x="108" y="130" width="22" height="30" rx="1" fill="#FF4081" opacity="0.06"/>
  <rect x="108" y="130" width="22" height="30" rx="1" stroke="#FF4081" stroke-width="0.5" fill="none" opacity="0.3"/>
  <!-- Rain -->
  <g stroke="#3A5A7E" stroke-width="0.4" opacity="0.2">
    <line x1="140" y1="0" x2="137" y2="30"/><line x1="180" y1="40" x2="177" y2="70"/>
    <line x1="90" y1="80" x2="87" y2="110"/><line x1="230" y1="20" x2="227" y2="50"/>
  </g>
  <!-- Ground reflection -->
  <rect x="0" y="300" width="280" height="50" fill="#050510"/>
  <ellipse cx="140" cy="320" rx="120" ry="15" fill="#00E5FF" opacity="0.04" filter="url(#glow2)"/>
  <ellipse cx="100" cy="325" rx="40" ry="5" fill="#FF4081" opacity="0.03" filter="url(#glow2)"/>
</svg>